<style>
:root{
  --bg:#F5F6F8; --card:#FFFFFF; --line:#E8EAF0; --line2:#F0F2F6;
  --ink:#101828; --sub:#667085; --faint:#98A2B3;
  --green:#00A66C; --green2:#0E7C66; --greenSoft:#E6F6EF;
  --prot:#EF5D6F; --carb:#16A394; --fat:#8A5CF6; --water:#38BDF8;
  --bad:#E5484D; --badSoft:#FDECEC; --amber:#F59E0B;
  --r:18px; --sh:0 1px 2px rgba(16,24,40,.05),0 1px 3px rgba(16,24,40,.05);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  min-height:100vh;padding-bottom:calc(84px + env(safe-area-inset-bottom))}
.wrap{max-width:480px;margin:0 auto;padding:14px 14px 8px}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;padding:0}
input,select{font-family:inherit;font-size:16px;color:var(--ink);background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;width:100%}
input:focus,select:focus{outline:2px solid var(--green);outline-offset:0;border-color:var(--green)}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.02em}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:16px;margin-top:12px}
.eyebrow{font-size:11px;font-weight:800;letter-spacing:.09em;text-transform:uppercase;color:var(--faint)}
.h1{font-size:22px;font-weight:800;letter-spacing:-.02em}
.sub{color:var(--sub);font-size:13px}
.row{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
/* top bar */
.top{display:flex;align-items:center;justify-content:space-between;padding:4px 2px 2px}
.brand{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;letter-spacing:-.02em}
.brand .b{width:26px;height:26px;border-radius:8px;background:var(--green);display:grid;place-items:center}
/* date nav */
.datenav{display:flex;align-items:center;gap:6px;margin-top:12px}
.datenav .dn{width:38px;height:38px;border-radius:12px;background:var(--card);border:1px solid var(--line);display:grid;place-items:center;font-size:16px;color:var(--sub)}
.datenav .dt{flex:1;text-align:center;font-weight:800;font-size:15px}
.datenav .dt .sm{display:block;font-weight:600;font-size:11px;color:var(--faint)}
.todaychip{font-size:12px;font-weight:800;color:var(--green);background:var(--greenSoft);border-radius:999px;padding:6px 11px}
/* week strip */
/* MFP-style header */
.daytitle{font-size:26px;font-weight:800;letter-spacing:-.03em;display:flex;align-items:center;gap:7px}
.daytitle .caret{font-size:13px;color:var(--faint);transform:translateY(2px)}
/* MFP-style calories + macros cards */
.calrow{display:flex;align-items:baseline;gap:7px;margin-top:9px}
.calbig{font-size:26px;font-weight:800;letter-spacing:-.03em}
.calof{font-size:14px;color:var(--faint);font-weight:600;flex:1}
.calleft{font-size:15px;font-weight:800}
.calleft small{font-size:11px;color:var(--faint);font-weight:700;margin-left:3px}
.calbar{height:9px;border-radius:6px;background:var(--line2);margin-top:11px;overflow:hidden}
.calbar i{display:block;height:100%;border-radius:6px;transition:width .35s ease}
.maccols{display:flex;gap:14px;margin-top:11px}
.maccols .mc{flex:1}
.maccols .mc .mn{font-size:13px;font-weight:700}
.maccols .mc .mvv{font-size:15px;font-weight:800;margin-top:2px}
.maccols .mc .mvv small{font-size:11.5px;color:var(--faint);font-weight:600}
.swapbtn{width:30px;height:30px;border-radius:9px;background:var(--bg);border:1px solid var(--line);color:var(--sub);font-size:13px}
/* calendar sheet */
.calhd{display:flex;align-items:center;justify-content:space-between;margin:4px 2px 10px}
.calhd .cm{font-size:17px;font-weight:800}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calgrid .cw{text-align:center;font-size:10px;font-weight:800;color:var(--faint);padding:5px 0;letter-spacing:.05em}
.cd{aspect-ratio:1;border-radius:50%;display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--ink);position:relative}
.cd.dim{color:var(--faint);font-weight:500}
.cd.tdy{box-shadow:inset 0 0 0 1.5px var(--green)}
.cd.cur{background:var(--green);color:#fff}
.cd.has::after{content:"";position:absolute;bottom:3px;width:4px;height:4px;border-radius:2px;background:var(--green)}
.cd.cur.has::after{background:#fff}
.wkstrip{display:flex;gap:6px;margin-top:12px}
.wk{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0;border-radius:12px;background:var(--card);border:1px solid var(--line)}
.wk span{font-size:11px;font-weight:800;color:var(--faint)}
.wk i{font-style:normal;width:20px;height:20px;border-radius:50%;border:1.5px solid var(--line);display:grid;place-items:center;font-size:10px;color:var(--faint)}
.wk.done i{background:var(--green);border-color:var(--green);color:#fff}
.wk.cur{border-color:var(--ink);background:var(--ink)}
.wk.cur span{color:#fff}
.wk.cur i{border-color:rgba(255,255,255,.4);color:#fff}
.wk.cur.done i{background:var(--green);border-color:var(--green)}
.trainchip{margin-top:12px;padding:9px 12px;border-radius:11px;background:var(--greenSoft);color:var(--green2);font-size:12.5px;font-weight:700}
.trainchip.rest{background:var(--line2);color:var(--sub)}
.mealmac{display:flex;gap:14px;font-size:12px;font-weight:700;margin-top:4px}
/* ring summary */
.sumgrid{display:flex;gap:16px;align-items:center}
.ringwrap{position:relative;width:132px;height:132px;flex-shrink:0}
.ringwrap svg{transform:rotate(-90deg)}
.ringmid{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ringmid .big{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1}
.ringmid .lbl{font-size:11px;font-weight:700;color:var(--faint);margin-top:3px;text-transform:uppercase;letter-spacing:.06em}
.macro{margin-top:9px}
.macro:first-child{margin-top:0}
.macro .mrow{display:flex;justify-content:space-between;font-size:12.5px;font-weight:700}
.macro .mrow .mv{color:var(--sub);font-weight:600}
.mbar{height:6px;border-radius:4px;background:var(--line2);margin-top:4px;overflow:hidden}
.mbar i{display:block;height:100%;border-radius:4px;transition:width .35s ease}
.sumfoot{display:flex;justify-content:space-between;margin-top:13px;padding-top:12px;border-top:1px solid var(--line2)}
.sumfoot .cell{text-align:center;flex:1}
.sumfoot .cell b{display:block;font-size:15px;font-weight:800}
.sumfoot .cell span{font-size:11px;color:var(--faint);font-weight:600}
/* meal cards */
.mealhd{display:flex;align-items:center;justify-content:space-between}
.mealhd .mt{font-weight:800;font-size:15px}
.mealhd .mcal{font-weight:800;font-size:14px;color:var(--sub)}
.entry{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:10px 2px;position:relative;background:var(--card);transition:transform .16s ease}
.swipewrap{position:relative;overflow:hidden}
.swipewrap + .swipewrap{border-top:1px solid var(--line2)}
.swipebg{position:absolute;inset:0;background:var(--badSoft);color:var(--bad);display:flex;align-items:center;padding-left:14px;font-weight:800;font-size:13px;opacity:0;border-radius:10px}
.swipewrap.swiping .swipebg{opacity:1}
.entry .en{font-size:14px;font-weight:600;line-height:1.25}
.entry .ea{font-size:12px;color:var(--faint)}
.entry .ec{font-weight:800;font-size:14px;color:var(--ink)}
.entry .ep{font-size:11px;color:var(--faint);text-align:right}
.mealfoot{display:flex;gap:8px;margin-top:8px}
.addbtn{flex:1;padding:10px;border-radius:12px;background:var(--greenSoft);color:var(--green);font-weight:800;font-size:13.5px}
.copybtn{width:44px;border-radius:12px;background:var(--card);border:1px solid var(--line);color:var(--sub);font-size:15px}
.empty{color:var(--faint);font-size:13px;padding:10px 2px 2px}
/* water */
.glasses{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.glass{width:34px;height:42px;border-radius:9px 9px 12px 12px;border:2px solid var(--line);display:grid;place-items:center;font-size:15px;color:var(--line);background:var(--card);transition:all .15s}
.glass.fill{border-color:var(--water);background:#EBF8FF;color:var(--water)}
/* nav */
.tabbar{position:fixed;left:0;right:0;bottom:0;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-top:1px solid var(--line);z-index:40}
.tabbar .in{max-width:480px;margin:0 auto;display:flex;padding:6px 6px calc(6px + env(safe-area-inset-bottom))}
.tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 0;border-radius:12px;color:var(--faint);font-size:10.5px;font-weight:700}
.tb svg{width:22px;height:22px}
.tb.on{color:var(--green)}
/* chips + segments */
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.chip{padding:8px 13px;border-radius:999px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:12.5px;color:var(--sub)}
.chip.on{background:var(--ink);border-color:var(--ink);color:#fff}
.chip.grn{background:var(--greenSoft);border-color:transparent;color:var(--green)}
/* plan day grid */
.daygrid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:10px}
.dg{padding:9px 2px;border-radius:10px;background:var(--bg);border:1px solid var(--line);text-align:center;font-size:11px;font-weight:700;color:var(--sub)}
.dg b{display:block;font-size:10px;color:var(--faint);font-weight:700}
/* list rows */
.lrow{display:flex;align-items:center;gap:10px;padding:12px 2px;border-top:1px solid var(--line2)}
.lrow:first-child{border-top:none}
.lrow .ln{font-weight:700;font-size:14.5px}
.lrow .ls{font-size:12px;color:var(--faint)}
.pillbtn{padding:9px 15px;border-radius:11px;font-weight:800;font-size:13px;background:var(--green);color:#fff}
.pillbtn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
.pillbtn.danger{background:var(--badSoft);color:var(--bad)}
.bigbtn{width:100%;padding:14px;border-radius:14px;background:var(--green);color:#fff;font-weight:800;font-size:15px;margin-top:12px}
.bigbtn.ghost{background:var(--card);border:1px solid var(--line);color:var(--ink)}
/* sheets */
.scrim{position:fixed;inset:0;background:rgba(16,24,40,.44);z-index:60;display:flex;align-items:flex-end;justify-content:center}
.sheet{width:100%;max-width:480px;background:var(--bg);border-radius:22px 22px 0 0;max-height:90vh;display:flex;flex-direction:column;padding:10px 14px calc(16px + env(safe-area-inset-bottom))}
.grab{width:38px;height:5px;border-radius:3px;background:var(--line);margin:2px auto 10px}
.shead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.shead .st{font-size:17px;font-weight:800;letter-spacing:-.01em}
.shead .sx{width:32px;height:32px;border-radius:10px;background:var(--card);border:1px solid var(--line);color:var(--sub);font-size:15px}
.sbody{overflow:auto;flex:1}
.srchrow{display:flex;gap:8px}
.srchrow input{flex:1}
.scan{padding:0 15px;border-radius:12px;background:var(--ink);color:#fff;font-weight:800;font-size:13px}
.res{display:flex;align-items:center;gap:10px;width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px;margin-top:8px}
.res .rn{font-weight:700;font-size:14px;line-height:1.25}
.res .rs{font-size:11.5px;color:var(--faint);margin-top:1px}
.res .rm{font-size:12px;color:var(--sub);margin-top:2px}
.res .rc{font-weight:800;font-size:14px}
.srctag{font-size:9px;font-weight:800;letter-spacing:.04em;padding:2px 5px;border-radius:5px;margin-left:6px;vertical-align:1px}
.srctag.fs{background:#EEF4FF;color:#3B5BDB}
.srctag.off{background:#FFF4E6;color:#D9730D}
.srctag.mine{background:var(--greenSoft);color:var(--green)}
.reshd{font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin:16px 2px 2px}
/* pick / stepper */
.stepper{display:flex;align-items:center;gap:12px;justify-content:center}
.stepper .sb{width:44px;height:44px;border-radius:14px;background:var(--card);border:1px solid var(--line);font-size:22px;color:var(--ink);display:grid;place-items:center}
.stepper .sv{min-width:92px;text-align:center;font-size:19px;font-weight:800}
.pickmac{display:flex;justify-content:center;gap:14px;margin-top:10px}
.pickmac .pm{text-align:center}
.pickmac .pm b{display:block;font-size:16px;font-weight:800}
.pickmac .pm span{font-size:10.5px;color:var(--faint);font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.starbtn{display:flex;align-items:center;gap:7px;justify-content:center;width:100%;padding:11px;border-radius:12px;background:var(--card);border:1px solid var(--line);font-weight:700;font-size:13px;color:var(--sub);margin-top:10px}
.starbtn.on{color:var(--amber);border-color:#FBD38D;background:#FFFBEB}
/* forms */
.frow{display:flex;gap:10px;margin-top:10px}
.frow>div{flex:1}
.flabel{font-size:12px;font-weight:700;color:var(--sub);margin:12px 2px 5px}
.fnote{font-size:12px;color:var(--faint);margin-top:8px;line-height:1.5}
.kv{display:flex;justify-content:space-between;padding:11px 2px;border-top:1px solid var(--line2);font-size:14px}
.kv:first-child{border-top:none}
.kv b{font-weight:800}
.camv{width:100%;border-radius:14px;background:#000;max-height:230px;object-fit:cover;margin-top:10px}
.warn{background:#FFFBEB;border:1px solid #FDE68A;color:#92400E;border-radius:12px;padding:10px 12px;font-size:12.5px;line-height:1.5;margin-top:10px}
.okline{background:var(--greenSoft);color:var(--green2);border-radius:12px;padding:10px 12px;font-size:12.5px;font-weight:700;margin-top:10px}
.chartcard svg{display:block;width:100%}
textarea{width:100%;min-height:110px;font-family:ui-monospace,Menlo,monospace;font-size:11px;border:1px solid var(--line);border-radius:12px;padding:10px;background:var(--card);color:var(--ink)}
@media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>

   One JSON blob per user. Local copy in localStorage (instant + offline),
   server copy in D1 via /api/state. Newer updatedAt wins on load. */
var LS=null; /* set after sign-in: fuelprotocol:v5:<uid> */
function freshDB(){return{
  profile:{sex:"m",age:34,heightIn:70,weightLb:180,activity:1.55,goalRate:1,calMode:"auto",calCustom:2300,
           macroMode:"g",pT:180,cT:250,fT:65,pP:32,cP:44,fP:24,waterGoal:8},
  log:{},favs:[],custom:[],recipes:[],plans:[],recents:[],freq:{},updatedAt:0
};}
var DB=freshDB();
function normalize(){
  if(!DB.profile)DB.profile=freshDB().profile;
  if(!DB.profile.burns)DB.profile.burns=[0,0,0,0,0,0,0];
  if(DB.profile.shiftRest==null)DB.profile.shiftRest=0;
  if(!DB.profile.macroView)DB.profile.macroView="g";
  if(!DB.updatedAt)DB.updatedAt=0;
  ["log","freq"].forEach(function(k){if(!DB[k])DB[k]={};});
  ["favs","custom","recipes","plans","recents"].forEach(function(k){if(!DB[k])DB[k]=[];});
}
function adopt(o){var f=freshDB();Object.keys(f).forEach(function(k){DB[k]=(o&&o[k]!=null)?o[k]:f[k];});normalize();}
function loadLocal(){
  try{
    var raw=LS&&localStorage.getItem(LS);
    if(raw){adopt(JSON.parse(raw));return true;}
    /* one-time lift of the old single-user data on this device */
    var old=localStorage.getItem("fuelprotocol:v4");
    if(old&&!localStorage.getItem("fuelprotocol:migrated")){
      adopt(JSON.parse(old));DB.updatedAt=Date.now();
      localStorage.setItem("fuelprotocol:migrated","1");
      return true;
    }
  }catch(e){}
  normalize();return false;
}
function save(){
  DB.updatedAt=Date.now();
  try{if(LS)localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}
  schedulePush();
}

var AUTH={state:"loading",email:"",uid:"",sent:false,busy:false,err:"",sync:"idle",devLink:""};
var pushTimer=null,pushing=false,pushAgain=false;
function api(path,opts){opts=opts||{};opts.credentials="same-origin";return fetch(API_BASE+path,opts);}
function schedulePush(){
  if(AUTH.state!=="in")return;
  AUTH.sync="pending";paintSync();
  clearTimeout(pushTimer);pushTimer=setTimeout(pushState,1800);
}
function pushState(){
  if(AUTH.state!=="in")return;
  if(pushing){pushAgain=true;return;}
  pushing=true;AUTH.sync="saving";paintSync();
  api("/api/state",{method:"PUT",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({state:DB,updatedAt:DB.updatedAt})})
   .then(function(r){AUTH.sync=r.ok?"saved":"error";})
   .catch(function(){AUTH.sync="offline";})
   .then(function(){pushing=false;paintSync();if(pushAgain){pushAgain=false;schedulePush();}});
}
function syncLabel(){
  return{idle:"",pending:"Saving\u2026",saving:"Saving\u2026",saved:"All changes saved",
    error:"Couldn\u2019t save to your account \u2014 will retry",offline:"Offline \u2014 saved on this device"}[AUTH.sync]||"";
}
function paintSync(){var el=document.getElementById("syncdot");if(!el)return;
  el.textContent=syncLabel();
  el.style.color=AUTH.sync==="error"?"var(--bad)":(AUTH.sync==="offline"?"var(--amber)":"var(--faint)");}
function pullState(){
  return api("/api/state").then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(!d)return;
    var srv=d.state,su=d.updatedAt||0;
    if(srv&&su>(DB.updatedAt||0)){
      adopt(srv);DB.updatedAt=su;
      try{if(LS)localStorage.setItem(LS,JSON.stringify(DB));}catch(e){}
      AUTH.sync="saved";
    }else if((DB.updatedAt||0)>su){pushState();}
    else{AUTH.sync="saved";}
  }).catch(function(){AUTH.sync="offline";});
}
function boot(){
  if(location.search.indexOf("signedin")>=0)try{history.replaceState({},"",location.pathname);}catch(e){}
  api("/api/me").then(function(r){return r.ok?r.json():null;}).then(function(d){
    if(d&&d.uid){
      AUTH.state="in";AUTH.uid=d.uid;AUTH.email=d.email||"";
      try{localStorage.setItem("fuelprotocol:lastuid",d.uid);localStorage.setItem("fuelprotocol:lastemail",AUTH.email);}catch(e){}
      LS="fuelprotocol:v5:"+d.uid;loadLocal();render();
      return pullState().then(render);
    }
    AUTH.state="out";render();
  }).catch(function(){
    var lu=null,le="";try{lu=localStorage.getItem("fuelprotocol:lastuid");le=localStorage.getItem("fuelprotocol:lastemail")||"";}catch(e){}
    if(lu){AUTH.state="in";AUTH.uid=lu;AUTH.email=le;AUTH.sync="offline";LS="fuelprotocol:v5:"+lu;loadLocal();}
    else AUTH.state="out";
    render();
  });
}
function sendLink(){
  var el=document.getElementById("authmail");
  var mail=((el&&el.value)||"").trim();
  if(!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(mail)){AUTH.err="Enter a valid email address.";render();return;}
  AUTH.email=mail;AUTH.err="";AUTH.busy=true;render();

   .then(function(r){return r.json().then(function(j){return{ok:r.ok,j:j};});})
   .then(function(res){
     AUTH.busy=false;
     if(res.ok){AUTH.sent=true;AUTH.devLink=res.j.devLink||"";}
     else AUTH.err=res.j.error==="rate"?"A link was just sent \u2014 check your email or wait a minute.":"Couldn\u2019t send the link. Try again.";
     render();

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}

function dateAdd(ds,n){var p=ds.split("-");var d=new Date(+p[0],+p[1]-1,+p[2]);d.setDate(d.getDate()+n);
  return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");}

  var wd=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"][d.getDay()];
  var mo=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"][d.getMonth()];

function scaledE(e){var s=e.amt/e.base;return{cal:e.cal*s,p:e.p*s,c:e.c*s,f:e.f*s};}
function mealTotal(list){var t={cal:0,p:0,c:0,f:0};(list||[]).forEach(function(e){var m=scaledE(e);t.cal+=m.cal;t.p+=m.p;t.c+=m.c;t.f+=m.f;});return t;}
function dayTotal(d){var t={cal:0,p:0,c:0,f:0};["bf","lu","di","sn"].forEach(function(m){var mt=mealTotal(d.meals[m]);t.cal+=mt.cal;t.p+=mt.p;t.c+=mt.c;t.f+=mt.f;});return t;}

/* targets */
function bmr(){var P=DB.profile,kg=P.weightLb*0.45359,cm=P.heightIn*2.54;
  return Math.round(10*kg+6.25*cm-5*P.age+(P.sex==="m"?5:-161));}
function tdee(){return Math.round(bmr()*DB.profile.activity);}
function calTarget(){var P=DB.profile;
  if(P.calMode==="custom")return P.calCustom;
  return Math.max(1200,Math.round(tdee()-P.goalRate*500));}
function targets(){var P=DB.profile,cal=calTarget();
  if(P.macroMode==="pct"){return{cal:cal,p:Math.round(cal*P.pP/100/4),c:Math.round(cal*P.cP/100/4),f:Math.round(cal*P.fP/100/9)};}
  return{cal:cal,p:P.pT,c:P.cT,f:P.fT};}

/* training-day cycling: each training day earns its burn back (keeps the weekly
   loss rate exact); optionally shift extra calories from rest days to training days. */
function wdOf(ds){var p=ds.split("-");return new Date(+p[0],+p[1]-1,+p[2]).getDay();}
function burnStats(){var b=DB.profile.burns||[],tot=0,k=0;
  for(var i=0;i<7;i++){if(b[i]>0){tot+=b[i];k++;}}
  return{tot:tot,k:k};}
function dayTargetWd(wd){
  var T=targets(),P=DB.profile,b=P.burns||[],st=burnStats();
  if(!st.k)return{cal:T.cal,p:T.p,c:T.c,f:T.f,burn:0,base:T.cal};
  var s=P.shiftRest||0,burn=b[wd]||0;
  var cal=Math.round(T.cal+(burn>0?burn+s*(7-st.k)/st.k:-s));
  var c=Math.max(0,Math.round(T.c+(cal-T.cal)/4));
  return{cal:cal,p:T.p,c:c,f:T.f,burn:burn,base:T.cal};
}
function dayTarget(ds){return dayTargetWd(wdOf(ds));}

/* entries */
function defToEntry(def,amt){return{id:uid(),name:def.name||def.n,unit:def.unit,step:def.step,base:def.base,
  amt:amt!=null?amt:def.base,cal:def.cal,p:def.p,c:def.c,f:def.f,src:def.src||"lib",fsid:def.fsid||null};}
function foodKey(d){return (d.name||d.n)+"|"+(d.fsid||d.src||"lib");}
function isFav(d){var k=foodKey(d);return DB.favs.some(function(f){return foodKey(f)===k;});}
function toggleFav(d){var k=foodKey(d);
  if(isFav(d)){DB.favs=DB.favs.filter(function(f){return foodKey(f)!==k;});}
  else{DB.favs.unshift({name:d.name||d.n,unit:d.unit,step:d.step,base:d.base,cal:d.cal,p:d.p,c:d.c,f:d.f,src:d.src||"lib",fsid:d.fsid||null});}
  save();}
function noteUse(d){var k=foodKey(d);DB.freq[k]=(DB.freq[k]||0)+1;
  var clean={name:d.name||d.n,unit:d.unit,step:d.step,base:d.base,cal:d.cal,p:d.p,c:d.c,f:d.f,src:d.src||"lib",fsid:d.fsid||null,brand:d.brand||""};
  DB.recents=DB.recents.filter(function(r){return foodKey(r)!==k;});
  DB.recents.unshift(clean);if(DB.recents.length>15)DB.recents=DB.recents.slice(0,15);}

/* built-in plan */
function builtinPlan(){
  var days=[];
  for(var w=0;w<3;w++){DAYNAMES.forEach(function(dn){
    var spec=ROT[w][dn];
    var mk=function(keys){return keys.map(function(k){return defToEntry(Object.assign({name:FOODS[k].n},FOODS[k]));});};
    days.push({name:"W"+(w+1)+" "+dn,meals:{
      bf:mk(["eggwhites","wholeegg","ffcheese","cbacon","oats"]),
      lu:mk(spec[0]),di:mk(spec[1]),
      sn:mk(["scoop","yogurt","blueberries","treat"])}});
  });}
  return{id:"builtin",name:"3-Week Cut",builtin:true,days:days};
}

function ringSVG(eaten,target){
  var r=56,cx=66,cy=66,C=2*Math.PI*r;
  var pct=target>0?Math.min(eaten/target,1):0;

  var col=over?"var(--bad)":"url(#gr)";
  return '<svg width="132" height="132" viewBox="0 0 132 132">'+
   '<defs><linearGradient id="gr" x1="0" y1="0" x2="1" y2="1">'+
   '<stop offset="0" stop-color="#00B876"/><stop offset="1" stop-color="#0E7C66"/></linearGradient></defs>'+
   '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--line2)" stroke-width="11"/>'+
   '<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+col+'" stroke-width="11" stroke-linecap="round" '+
   'stroke-dasharray="'+C+'" stroke-dashoffset="'+(C*(1-pct))+'" style="transition:stroke-dashoffset .5s ease"/>'+
   '</svg>';
}
function barChart(vals,labels,target,tgts){
  var W=420,H=150,pad=8,bw=Math.floor((W-pad*2)/vals.length)-6;
  var max=Math.max(target*1.25,1);vals.forEach(function(v){if(v>max)max=v;});
  var ty=H-18-((target/max)*(H-30));
  var s='<svg viewBox="0 0 '+W+' '+H+'">';
  s+='<line x1="'+pad+'" y1="'+ty+'" x2="'+(W-pad)+'" y2="'+ty+'" stroke="var(--faint)" stroke-dasharray="4 4" stroke-width="1"/>';
  vals.forEach(function(v,i){
    var h=(v/max)*(H-30),x=pad+i*(bw+6),y=H-18-h;
    var dayTgt=(tgts&&tgts[i])||target;
    var col=v===0?"var(--line2)":(v>dayTgt?"var(--bad)":"var(--green)");
    s+='<rect x="'+x+'" y="'+y+'" width="'+bw+'" height="'+Math.max(h,2)+'" rx="4" fill="'+col+'" opacity="'+(v===0?'1':'.9')+'"/>';
    if(labels[i])s+='<text x="'+(x+bw/2)+'" y="'+(H-5)+'" font-size="9" fill="var(--faint)" text-anchor="middle">'+labels[i]+'</text>';
  });
  s+='</svg>';return s;
}
function lineChart(pts){
  if(pts.length===1)return '<div class="okline num">Logged: '+pts[0].v+' lb \u2014 log tomorrow\u2019s weight to start the trend line.</div>';
  if(pts.length<2)return '<div class="fnote">The trend line starts at two logged weights.</div>';
  var W=420,H=150,pad=26;
  var vals=pts.map(function(p){return p.v;});
  var min=Math.min.apply(null,vals)-1,max=Math.max.apply(null,vals)+1;
  var X=function(i){return pad+ i*(W-pad-10)/(pts.length-1);};
  var Y=function(v){return 12+(1-(v-min)/(max-min))*(H-40);};
  var dstr=pts.map(function(p,i){return (i?"L":"M")+X(i).toFixed(1)+" "+Y(p.v).toFixed(1);}).join(" ");
  var s='<svg viewBox="0 0 '+W+' '+H+'">';
  s+='<text x="2" y="'+(Y(max-1)+4)+'" font-size="10" fill="var(--faint)">'+Math.round(max-1)+'</text>';
  s+='<text x="2" y="'+(Y(min+1)+4)+'" font-size="10" fill="var(--faint)">'+Math.round(min+1)+'</text>';
  s+='<path d="'+dstr+'" fill="none" stroke="url(#lg)" stroke-width="3" stroke-linecap="round"/>';
  s+='<defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#00B876"/><stop offset="1" stop-color="#0E7C66"/></linearGradient></defs>';
  pts.forEach(function(p,i){s+='<circle cx="'+X(i)+'" cy="'+Y(p.v)+'" r="3.5" fill="#fff" stroke="var(--green)" stroke-width="2"/>';});
  var lastP=pts[pts.length-1];
  s+='<text x="'+(W-8)+'" y="'+(Y(lastP.v)-8)+'" font-size="11" font-weight="700" fill="var(--ink)" text-anchor="end">'+lastP.v+' lb</text>';
  s+='</svg>';return s;
}

  var h=V.tab==="diary"?renderDiary():V.tab==="plans"?renderPlans():V.tab==="recipes"?renderRecipes():V.tab==="progress"?renderProgress():renderSettings();
  if(V.sheet){
    var titles={add:"Add to "+(V.sheet.target?MEALS[V.sheet.target.meal]||"recipe":""),entry:"Edit food",recipe:(V.sheet.editingId?"Edit recipe":"New recipe"),logrecipe:"Log recipe",newplan:"New plan",planday:(V.sheet.pdname||"Plan day"),applyplan:"Log full plan",cal:"Jump to a date",copy:"Copy a meal"};
    var body=V.sheet.kind==="add"?addSheetBody():V.sheet.kind==="entry"?entrySheetBody():V.sheet.kind==="recipe"?recipeSheetBody():V.sheet.kind==="logrecipe"?logRecipeBody():V.sheet.kind==="newplan"?newPlanBody():V.sheet.kind==="applyplan"?applyPlanBody():V.sheet.kind==="cal"?calBody():V.sheet.kind==="copy"?copyBody():planDayBody();
    h+=sheetHTML(body,titles[V.sheet.kind]||"");
  }
  el.innerHTML=h;
  var tb=[["diary","Diary"],["plans","Plans"],["recipes","Recipes"],["progress","Progress"],["settings","Settings"]];
  document.getElementById("tabbar").innerHTML=tb.map(function(t){return '<button class="tb'+(V.tab===t[0]?" on":"")+'" data-act="nav" data-v="'+t[0]+'">'+ICONS[t[0]]+t[1]+'</button>';}).join("");
  if(V.sheet&&V.sheet.kind==="add"){
    var q=document.getElementById("foodq");
    if(q&&V.sheet.focus){q.focus();q.setSelectionRange(q.value.length,q.value.length);V.sheet.focus=false;}
    if(V.sheet.scanning)setTimeout(bindScan,60);
  }
  if(V.tab==="settings")checkAPI();
}
function rerenderSheet(){
  var sb=document.querySelector(".sbody");
  if(!sb)return render();
  sb.innerHTML=V.sheet.kind==="add"?addSheetBody():V.sheet.kind==="entry"?entrySheetBody():V.sheet.kind==="recipe"?recipeSheetBody():V.sheet.kind==="logrecipe"?logRecipeBody():V.sheet.kind==="newplan"?newPlanBody():V.sheet.kind==="applyplan"?applyPlanBody():V.sheet.kind==="cal"?calBody():V.sheet.kind==="copy"?copyBody():planDayBody();
  if(V.sheet.kind==="add"&&V.sheet.scanning)setTimeout(bindScan,60);
}

/* -------------- API -------------- */
function checkAPI(){
  var el=document.getElementById("apistat");if(!el)return;
  fetch(API_BASE+"/api/health").then(function(r){return r.json();}).then(function(d){
    var e2=document.getElementById("apistat");if(!e2)return;
    e2.textContent=d.ok?(d.fs?"Connected (FatSecret + OFF)":"Connected (Open Food Facts)"):"Offline";
    e2.style.color=d.ok?"var(--green)":"var(--bad)";
  }).catch(function(){var e2=document.getElementById("apistat");if(e2){e2.textContent="Offline \u2014 library only";e2.style.color="var(--bad)";}});
}
var apiTimer=null;
function scheduleApi(){
  clearTimeout(apiTimer);
  var q=(V.sheet&&V.sheet.query||"").trim();
  if(q.length<2){if(V.sheet)V.sheet.apiResults=[];return;}
  V.sheet.apiBusy=true;
  apiTimer=setTimeout(function(){
    fetch(API_BASE+"/api/search?q="+encodeURIComponent(q)+"&max=15").then(function(r){return r.json();}).then(function(d){
      if(V.sheet&&V.sheet.kind==="add"&&(V.sheet.query||"").trim()===q){
        V.sheet.apiResults=d.items||[];V.sheet.apiBusy=false;rerenderSheet();}
    }).catch(function(){if(V.sheet){V.sheet.apiBusy=false;}});
  },350);
}
/* barcode via ZXing on demand */
var zx=null;
function loadZX(){return new Promise(function(res,rej){if(window.ZXing)return res();var s=document.createElement("script");s.src="https://unpkg.com/@zxing/library@0.20.0";s.onload=res;s.onerror=rej;document.head.appendChild(s);});}
function bindScan(){
  var v=document.getElementById("cam");if(!v)return;
  loadZX().then(function(){
    try{zx=new ZXing.BrowserMultiFormatReader();
      zx.decodeFromConstraints({video:{facingMode:{ideal:"environment"}}},v,function(result){
        if(result){var code=result.getText();stopZX();V.sheet.scanning=false;onBarcode(code);}});
    }catch(e){V.sheet.scanMsg="Camera unavailable \u2014 type the number instead.";rerenderSheet();}
  }).catch(function(){V.sheet.scanMsg="Scanner failed to load \u2014 type the number instead.";rerenderSheet();});
}
function stopZX(){try{if(zx)zx.reset();}catch(e){}zx=null;}
function onBarcode(code){
  V.sheet.scanMsg="Looking up "+code+"\u2026";rerenderSheet();
  fetch(API_BASE+"/api/barcode?code="+encodeURIComponent(code)).then(function(r){return r.json();}).then(function(d){
    if(!V.sheet)return;
    if(d.items&&d.items.length){V.sheet.scanned=d.items;V.sheet.query="";V.sheet.scanMsg="";}
    else{V.sheet.scanned=[];V.sheet.scanMsg="No match for "+code+". Try searching by name.";}
    rerenderSheet();
  }).catch(function(){if(V.sheet){V.sheet.scanMsg="Lookup failed \u2014 check your connection.";rerenderSheet();}});
}

/* -------------- event wiring -------------- */
function openAdd(target){V.sheet={kind:"add",target:target,query:"",seg:"recent",apiResults:[],scanned:[],cands:[],pick:null,scanning:false,scanMsg:"",focus:false};render();}
function commitAdd(def,amt){
  var sh=V.sheet;noteUse(def);
  var e=defToEntry(def,amt);
  if(sh.target.type==="recipe"){sh.back.draft.items.push(e);V.sheet=sh.back;save();render();return;}
  day(V.date).meals[sh.target.meal].push(e);
  save();V.sheet=null;render();
}
document.addEventListener("input",function(ev){
  if(ev.target.id==="ipT"||ev.target.id==="icT"||ev.target.id==="ifT"){
    var gv2=function(id){var n=parseFloat((document.getElementById(id)||{}).value);return isNaN(n)?0:n;};
    var live=Math.round(4*gv2("ipT")+4*gv2("icT")+9*gv2("ifT"));
    var mc1=document.getElementById("maccal");if(mc1)mc1.textContent=live.toLocaleString();
    var mc2=document.getElementById("maccalbtn");if(mc2)mc2.textContent=live.toLocaleString();
    return;
  }
  if(ev.target.id==="foodq"&&V.sheet&&V.sheet.kind==="add"){
    V.sheet.query=ev.target.value;V.sheet.scanned=[];V.sheet.pick=null;
    scheduleApi();
    var sb=document.querySelector(".sbody");
    if(sb){var keep=document.getElementById("foodq");var val=keep.value;
      rerenderSheet();var nq=document.getElementById("foodq");
      if(nq){nq.value=val;nq.focus();nq.setSelectionRange(val.length,val.length);}}
  }
});
document.addEventListener("change",function(ev){
  if(ev.target.id==="daynote"){day(V.date).note=ev.target.value;save();return;}
  var bi=ev.target.getAttribute&&ev.target.getAttribute("data-burn");
  if(bi!=null){var bn=parseFloat(ev.target.value);
    DB.profile.burns[+bi]=(isNaN(bn)||bn<0)?0:Math.round(bn);save();render();return;}
  var f=ev.target.getAttribute&&ev.target.getAttribute("data-set");
  if(!f)return;
  var v=ev.target.value;
  if(f==="sex"){DB.profile.sex=v;}
  else{var n=parseFloat(v);if(!isNaN(n))DB.profile[f]=n;}
  save();render();
});
document.addEventListener("click",function(ev){
  var el=ev.target.closest("[data-act]");if(!el)return;
  var act=el.getAttribute("data-act");
  /* account */
  if(act==="authsend"){sendLink();return;}
  else if(act==="authback"){AUTH.sent=false;AUTH.devLink="";AUTH.err="";render();return;}
  else if(act==="signout"){
    api("/api/auth/logout",{method:"POST"}).catch(function(){}).then(function(){
      try{localStorage.removeItem("fuelprotocol:lastuid");localStorage.removeItem("fuelprotocol:lastemail");}catch(e){}
      AUTH={state:"out",email:AUTH.email,uid:"",sent:false,busy:false,err:"",sync:"idle",devLink:""};
      DB=freshDB();LS=null;V={tab:"diary",date:todayStr(),sheet:null};render();});
    return;}
  /* nav + diary */
  if(act==="nav"){V.tab=el.getAttribute("data-v");V.sheet=null;render();}
  else if(act==="dateprev"){V.date=dateAdd(V.date,-1);render();}
  else if(act==="datenext"){V.date=dateAdd(V.date,1);render();}
  else if(act==="datetoday"){V.date=todayStr();render();}
  else if(act==="openadd"){openAdd({type:"meal",meal:el.getAttribute("data-m")});}
  else if(act==="openentry"){
    if(Date.now()<SW.blockUntil)return;
    var m=el.getAttribute("data-m"),id=el.getAttribute("data-id");
    var e=day(V.date).meals[m].filter(function(x){return x.id===id;})[0];
    if(e){V.sheet={kind:"entry",meal:m,entry:e};render();}
  }
  else if(act==="opencal"){var pc=V.date.split("-");V.sheet={kind:"cal",y:+pc[0],m:+pc[1]-1};render();}
  else if(act==="calprev"||act==="calnext"){var mm2=V.sheet.m+(act==="calnext"?1:-1);
    if(mm2<0){mm2=11;V.sheet.y--;}if(mm2>11){mm2=0;V.sheet.y++;}V.sheet.m=mm2;rerenderSheet();}
  else if(act==="calpick"){V.date=el.getAttribute("data-d");V.sheet=null;render();}
  else if(act==="macroswap"){DB.profile.macroView=DB.profile.macroView==="g"?"pct":"g";save();render();}
  else if(act==="opencopy"){V.sheet={kind:"copy",target:el.getAttribute("data-m"),src:dateAdd(V.date,-1),srcMeal:el.getAttribute("data-m")};render();}
  else if(act==="cpprev"){V.sheet.src=dateAdd(V.sheet.src,-1);rerenderSheet();}
  else if(act==="cpnext"){V.sheet.src=dateAdd(V.sheet.src,1);rerenderSheet();}
  else if(act==="cpmeal"){V.sheet.srcMeal=el.getAttribute("data-v");rerenderSheet();}
  else if(act==="cpgo"){
    var srcL=(DB.log[V.sheet.src]&&DB.log[V.sheet.src].meals&&DB.log[V.sheet.src].meals[V.sheet.srcMeal])||[];
    srcL.forEach(function(e){var c=JSON.parse(JSON.stringify(e));c.id=uid();day(V.date).meals[V.sheet.target].push(c);});
    save();V.sheet=null;render();}
  else if(act==="copymeal"){
    var mm=el.getAttribute("data-m");
    var src=(DB.log[dateAdd(V.date,-1)]&&DB.log[dateAdd(V.date,-1)].meals[mm])||[];
    src.forEach(function(e){var c=JSON.parse(JSON.stringify(e));c.id=uid();day(V.date).meals[mm].push(c);});
    save();render();
  }
  else if(act==="water"){
    var i=parseInt(el.getAttribute("data-i"),10),d=day(V.date);
    d.water=(d.water===i+1)?i:i+1;save();render();
  }
  /* sheets generic */
  else if(act==="sheetclose"||act==="scrim"){
    if(act==="scrim"&&ev.target.closest("[data-stop]"))return;
    stopZX();
    if(V.sheet&&V.sheet.kind==="add"&&V.sheet.back){V.sheet=V.sheet.back;render();return;}
    V.sheet=null;render();
  }
  /* add sheet */
  else if(act==="seg"){V.sheet.seg=el.getAttribute("data-v");rerenderSheet();}
  else if(act==="scanopen"){V.sheet.scanning=true;V.sheet.scanMsg="";rerenderSheet();}
  else if(act==="scanstop"){stopZX();V.sheet.scanning=false;rerenderSheet();}
  else if(act==="bclookup"){var b=document.getElementById("bcode");if(b&&b.value.trim()){stopZX();V.sheet.scanning=false;onBarcode(b.value.trim());}}
  else if(act==="pick"){var d0=V.sheet.cands[parseInt(el.getAttribute("data-idx"),10)];
    if(d0){V.sheet.pick={def:d0,amt:d0.base};rerenderSheet();}}
  else if(act==="pickinc"||act==="pickdec"){var pk=V.sheet.pick;
    var nv=pk.amt+(act==="pickinc"?pk.def.step:-pk.def.step);
    pk.amt=Math.max(pk.def.step,Math.round(nv*100)/100);rerenderSheet();}
  else if(act==="pickfav"){toggleFav(V.sheet.pick.def);rerenderSheet();}
  else if(act==="pickadd"){commitAdd(V.sheet.pick.def,V.sheet.pick.amt);}
  else if(act==="pickcancel"){V.sheet.pick=null;rerenderSheet();}
  else if(act==="quickadd"){
    var qc=parseFloat((document.getElementById("qcal")||{}).value);
    if(isNaN(qc)||qc<=0)return;
    var g=function(id){var n=parseFloat((document.getElementById(id)||{}).value);return isNaN(n)?0:n;};
    var qn=(document.getElementById("qname")||{}).value||"Quick add";
    commitAdd({name:qn,unit:"x",step:1,base:1,cal:qc,p:g("qp"),c:g("qc"),f:g("qf"),src:"custom"},1);
  }
  else if(act==="cfsave"||act==="cfsaveonly"){
    var gv=function(id){var n=parseFloat((document.getElementById(id)||{}).value);return isNaN(n)?0:n;};
    var nm=((document.getElementById("cfname")||{}).value||"").trim();
    if(!nm)return;
    var unit=(document.getElementById("cfunit")||{}).value||"g";
    var base=gv("cfbase")||(unit==="g"?100:1);
    var def={name:nm,unit:unit,step:unit==="g"?25:(unit==="oz"?1:1),base:base,cal:gv("cfcal"),p:gv("cfp"),c:gv("cfc"),f:gv("cff"),src:"custom"};
    DB.custom.unshift(def);save();
    if(act==="cfsave")commitAdd(def,base);
    else{V.sheet.seg="mine";rerenderSheet();}
  }
  /* entry sheet */
  else if(act==="entinc"||act==="entdec"){var e2=V.sheet.entry;
    var nv2=e2.amt+(act==="entinc"?e2.step:-e2.step);
    e2.amt=Math.max(e2.step,Math.round(nv2*100)/100);save();rerenderSheet();}
  else if(act==="entfav"){toggleFav(V.sheet.entry);rerenderSheet();}
  else if(act==="entdel"){
    var dd=day(V.date);dd.meals[V.sheet.meal]=dd.meals[V.sheet.meal].filter(function(x){return x.id!==V.sheet.entry.id;});
    save();V.sheet=null;render();}
  /* recipes */
  else if(act==="newrecipe"){V.sheet={kind:"recipe",draft:{id:uid(),name:"",servings:4,items:[]},editingId:null};render();}
  else if(act==="editrecipe"){var rr=DB.recipes.filter(function(x){return x.id===el.getAttribute("data-id");})[0];
    if(rr){V.sheet={kind:"recipe",draft:JSON.parse(JSON.stringify(rr)),editingId:rr.id};render();}}
  else if(act==="rsrvinc"||act==="rsrvdec"){var dr=V.sheet.draft;
    dr.servings=Math.max(1,dr.servings+(act==="rsrvinc"?1:-1));syncRName();rerenderSheet();}
  else if(act==="raddingr"){syncRName();var back=V.sheet;
    V.sheet={kind:"add",target:{type:"recipe"},back:back,query:"",seg:"recent",apiResults:[],scanned:[],cands:[],pick:null,scanning:false,scanMsg:"",focus:true};render();}
  else if(act==="rdeling"){syncRName();V.sheet.draft.items.splice(parseInt(el.getAttribute("data-i"),10),1);rerenderSheet();}
  else if(act==="rsave"){syncRName();var dr2=V.sheet.draft;
    if(!dr2.name)dr2.name="Untitled recipe";
    if(V.sheet.editingId){DB.recipes=DB.recipes.map(function(x){return x.id===V.sheet.editingId?dr2:x;});}
    else DB.recipes.unshift(dr2);
    save();V.sheet=null;V.tab="recipes";render();}
  else if(act==="rdelete"){DB.recipes=DB.recipes.filter(function(x){return x.id!==V.sheet.editingId;});save();V.sheet=null;render();}
  else if(act==="logrecipe"){V.sheet={kind:"logrecipe",rid:el.getAttribute("data-id"),meal:"di",n:1};render();}
  else if(act==="lrinc"||act==="lrdec"){V.sheet.n=Math.max(0.5,(V.sheet.n||1)+(act==="lrinc"?0.5:-0.5));rerenderSheet();}
  else if(act==="lrmeal"){V.sheet.meal=el.getAttribute("data-v");rerenderSheet();}
  else if(act==="lradd"){
    var r3=DB.recipes.filter(function(x){return x.id===V.sheet.rid;})[0];if(!r3)return;
    var t3=mealTotal(r3.items);
    var e3={id:uid(),name:r3.name,unit:"serving",step:0.5,base:1,amt:V.sheet.n||1,
      cal:t3.cal/r3.servings,p:t3.p/r3.servings,c:t3.c/r3.servings,f:t3.f/r3.servings,src:"recipe",fsid:null};
    day(V.date).meals[V.sheet.meal].push(e3);save();V.sheet=null;V.tab="diary";render();}
  /* plans */
  else if(act==="openplanday"){var pid=el.getAttribute("data-pid"),i2=parseInt(el.getAttribute("data-i"),10);
    var pl=pid==="builtin"?BUILTIN:DB.plans.filter(function(p){return p.id===pid;})[0];
    V.sheet={kind:"planday",pid:pid,i:i2,pdname:pl?pl.days[i2].name:""};render();}
  else if(act==="applyday"){
    var pl2=V.sheet.pid==="builtin"?BUILTIN:DB.plans.filter(function(p){return p.id===V.sheet.pid;})[0];
    if(pl2){var pd=pl2.days[V.sheet.i];
      ["bf","lu","di","sn"].forEach(function(m2){(pd.meals[m2]||[]).forEach(function(e4){
        var c4=JSON.parse(JSON.stringify(e4));c4.id=uid();day(V.date).meals[m2].push(c4);});});
      save();}
    V.sheet=null;V.tab="diary";render();}
  else if(act==="delplan"){DB.plans=DB.plans.filter(function(p){return p.id!==el.getAttribute("data-id");});save();render();}
  else if(act==="wkday"){V.date=el.getAttribute("data-d");render();}
  else if(act==="openapplyplan"){V.sheet={kind:"applyplan",pid:el.getAttribute("data-id"),start:todayStr()};render();}
  else if(act==="apprev"){V.sheet.start=dateAdd(V.sheet.start,-1);rerenderSheet();}
  else if(act==="apnext"){V.sheet.start=dateAdd(V.sheet.start,1);rerenderSheet();}
  else if(act==="apgo"){
    var apl=V.sheet.pid==="builtin"?BUILTIN:DB.plans.filter(function(p){return p.id===V.sheet.pid;})[0];
    if(apl){apl.days.forEach(function(pd,i){var ds=dateAdd(V.sheet.start,i);
      ["bf","lu","di","sn"].forEach(function(m2){(pd.meals[m2]||[]).forEach(function(e4){
        var c4=JSON.parse(JSON.stringify(e4));c4.id=uid();day(ds).meals[m2].push(c4);});});});
      save();}
    V.date=V.sheet.start;V.sheet=null;V.tab="diary";render();}
  else if(act==="newplan"){V.sheet={kind:"newplan",name:"",sel:[]};render();}
  else if(act==="npsel"){var ds2=el.getAttribute("data-d");
    var nm2=document.getElementById("plname");if(nm2)V.sheet.name=nm2.value;
    var ix=V.sheet.sel.indexOf(ds2);
    if(ix>=0)V.sheet.sel.splice(ix,1);else if(V.sheet.sel.length<3)V.sheet.sel.push(ds2);
    rerenderSheet();}
  else if(act==="npsave"){
    var nm3=((document.getElementById("plname")||{}).value||"").trim()||"My plan";
    if(!V.sheet.sel.length)return;
    var daysArr=V.sheet.sel.sort().map(function(ds3,ix2){var d5=DB.log[ds3];
      return{name:"Day "+(ix2+1),meals:JSON.parse(JSON.stringify(d5.meals))};});
    DB.plans.unshift({id:uid(),name:nm3,days:daysArr});
    save();V.sheet=null;render();}
  /* progress + settings */
  else if(act==="logweight"){
    var wv=parseFloat((document.getElementById("win")||{}).value);
    if(!isNaN(wv)&&wv>50){day(V.date).weight=wv;
      if(V.date===todayStr())DB.profile.weightLb=wv;
      save();render();}}
  else if(act==="macroapply"){
    var rd=function(id,fb){var n=parseFloat((document.getElementById(id)||{}).value);return isNaN(n)?fb:n;};
    DB.profile.pT=rd("ipT",DB.profile.pT);DB.profile.cT=rd("icT",DB.profile.cT);DB.profile.fT=rd("ifT",DB.profile.fT);
    DB.profile.calMode="custom";
    DB.profile.calCustom=Math.round(4*DB.profile.pT+4*DB.profile.cT+9*DB.profile.fT);
    save();render();}
  else if(act==="calmode"){DB.profile.calMode=el.getAttribute("data-v");save();render();}
  else if(act==="macromode"){DB.profile.macroMode=el.getAttribute("data-v");save();render();}
  else if(act==="exportdata"){
    var box=document.getElementById("impbox");
    if(box){box.value=JSON.stringify(DB);box.select();
      try{navigator.clipboard.writeText(box.value);}catch(e){}}
  }
  else if(act==="importdata"){
    var box2=document.getElementById("impbox");
    if(box2&&box2.value.trim()){
      try{var o2=JSON.parse(box2.value);Object.keys(DB).forEach(function(k){if(o2[k]!=null)DB[k]=o2[k];});save();render();}
      catch(e){box2.value="Import failed \u2014 that isn\u2019t valid exported data.";}
    }
  }
  else if(act==="resetdata"){
    if(el.getAttribute("data-armed")==="1"){localStorage.removeItem(LS);location.reload();}
    else{el.setAttribute("data-armed","1");el.textContent="Tap again to erase everything";}
  }
});
function syncRName(){var n=document.getElementById("rname");if(n&&V.sheet&&V.sheet.draft)V.sheet.draft.name=n.value;}
/* swipe right on a diary entry to remove it */
var SW={wrap:null,x:0,y:0,dx:0,active:false,blockUntil:0};
document.addEventListener("touchstart",function(ev){
  var w=ev.target.closest&&ev.target.closest(".swipewrap");
  if(!w)return;
  SW.wrap=w;SW.x=ev.touches[0].clientX;SW.y=ev.touches[0].clientY;SW.dx=0;SW.active=false;
},{passive:true});
document.addEventListener("touchmove",function(ev){
  if(!SW.wrap)return;
  var dx=ev.touches[0].clientX-SW.x,dy=ev.touches[0].clientY-SW.y;
  if(!SW.active){
    if(Math.abs(dy)>14&&Math.abs(dy)>Math.abs(dx)){SW.wrap=null;return;}
    if(dx>12&&Math.abs(dx)>Math.abs(dy)*1.3)SW.active=true;
  }
  if(SW.active&&dx>0){
    SW.dx=dx;
    var en=SW.wrap.querySelector(".entry");
    if(en){en.style.transition="none";en.style.transform="translateX("+Math.min(dx,150)+"px)";}
    SW.wrap.classList.add("swiping");
  }
},{passive:true});
document.addEventListener("touchend",function(){
  if(!SW.wrap)return;
  var en=SW.wrap.querySelector(".entry");
  if(SW.active&&SW.dx>95){
    var m=SW.wrap.getAttribute("data-m"),id=SW.wrap.getAttribute("data-id");
    var dd=day(V.date);dd.meals[m]=dd.meals[m].filter(function(x){return x.id!==id;});
    save();SW.blockUntil=Date.now()+450;render();
  }else if(en){en.style.transition="";en.style.transform="";SW.wrap.classList.remove("swiping");
    if(SW.active)SW.blockUntil=Date.now()+450;}
  SW.wrap=null;SW.active=false;SW.dx=0;
});
boot();
</script>
